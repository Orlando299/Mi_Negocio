    // ============================================================
    //  FUNCIONES
    // ============================================================
    async function crearTodo() {
      const resultados = document.getElementById('resultados');
      resultados.innerHTML = '⏳ Creando franquicias...<br>';

      for (const franquicia of franquicias) {
        resultados.innerHTML += `<br><strong>🏢 ${franquicia.nombre}</strong><br>`;

        // 1. Crear documento de la franquicia
        await db.collection('empresas').doc(franquicia.id).set({
          nombre: franquicia.nombre,
          direccion: franquicia.direccion,
          telefono: franquicia.telefono,
          tipo: 'franquicia-polar',
          fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
        });
        resultados.innerHTML += `✅ Franquicia creada<br>`;

        // 2. Crear usuarios
        for (const usuario of franquicia.usuarios) {
          try {
            const userCredential = await auth.createUserWithEmailAndPassword(
              usuario.email,
              usuario.password
            );

            await db.collection('empresas').doc(franquicia.id)
              .collection('usuarios').doc(usuario.email).set({
                nombre: usuario.nombre,
                email: usuario.email,
                rol: usuario.rol,
                empresaId: franquicia.id,
                uid: userCredential.user.uid,
                creado: firebase.firestore.FieldValue.serverTimestamp()
              });

            resultados.innerHTML += `✅ Usuario: ${usuario.email} (${usuario.rol})<br>`;
          } catch (error) {
            resultados.innerHTML += `❌ Error con ${usuario.email}: ${error.message}<br>`;
          }
        }

        // 3. Cargar inventario
        for (const producto of inventarioPolar) {
          await db.collection('empresas').doc(franquicia.id)
            .collection('inventario').add({
              ...producto,
              fechaIngreso: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        resultados.innerHTML += `✅ Inventario cargado (${inventarioPolar.length} productos)<br>`;

        // 4. Cargar clientes de prueba
        const clientesPrueba = [
          { nombre: 'Supermercado El Abasto', email: 'abasto@test.com', telefono: '0212-555-1000' },
          { nombre: 'Distribuidora La Economía', email: 'economia@test.com', telefono: '0212-555-1001' },
          { nombre: 'Licorería El Buen Gusto', email: 'buengusto@test.com', telefono: '0212-555-1002' }
        ];

        for (const cliente of clientesPrueba) {
          await db.collection('empresas').doc(franquicia.id)
            .collection('clientes').add(cliente);
        }
        resultados.innerHTML += `✅ Clientes de prueba cargados (3)<br>`;
      }

      resultados.innerHTML += `<br>🎉 ¡Franquicias creadas exitosamente!`;
      resultados.innerHTML += `<br><br><strong>📋 Resumen de acceso:</strong><br>`;
      for (const franquicia of franquicias) {
        resultados.innerHTML += `<br><strong>${franquicia.nombre}</strong><br>`;
        for (const usuario of franquicia.usuarios) {
          resultados.innerHTML += `  - ${usuario.email} / ${usuario.password}<br>`;
        }
      }
    }
